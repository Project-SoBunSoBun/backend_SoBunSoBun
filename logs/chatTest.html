<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>소분소분 채팅 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h2 { margin-bottom: 20px; color: #333; }
        .control-panel {
            display: grid;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 5px;
        }
        .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        label { font-weight: bold; min-width: 100px; }
        input[type="number"], input[type="text"] {
            flex: 1;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background: #45a049; }
        button.disconnect { background: #f44336; }
        button.disconnect:hover { background: #da190b; }
        #status {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            font-weight: bold;
            text-align: center;
        }
        #status.connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        #status.disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        #chat-box {
            width: 100%;
            height: 350px;
            border: 2px solid #ddd;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 12px;
            background: #fafafa;
            border-radius: 5px;
            font-size: 13px;
            line-height: 1.6;
        }
        .msg {
            margin-bottom: 8px;
            padding: 6px;
            background: white;
            border-left: 3px solid #4CAF50;
            border-radius: 3px;
        }
        .msg-input-group {
            display: flex;
            gap: 10px;
        }
        #message {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        #message:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.3);
        }
    </style>
</head>
<body>
<div class="container">
    <h2>🎯 소분소분 WebSocket 채팅 테스트</h2>

    <!-- 로그인 영역 -->
    <div id="loginSection" style="margin-bottom: 20px; padding: 15px; background: #e3f2fd; border-radius: 5px;">
        <div style="display: flex; gap: 10px; align-items: center;">
            <label style="font-weight: bold; min-width: 80px;">JWT 토큰:</label>
            <input type="text" id="jwtTokenLogin" placeholder="JWT 토큰 입력..." style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            <button onclick="loginWithToken()" style="padding: 8px 15px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer;">로그인</button>
        </div>
    </div>

    <!-- 사용자 정보 표시 영역 -->
    <div id="userInfo" style="display: none; margin-bottom: 20px; padding: 15px; background: #c8e6c9; border-radius: 5px;">
        <div style="font-weight: bold; color: #1b5e20;">
            👋 <span id="userNickname"></span>님 안녕하세요!
            <button onclick="logout()" style="float: right; padding: 5px 10px; background: #f44336; color: white; border: none; border-radius: 4px; cursor: pointer;">로그아웃</button>
        </div>
    </div>

    <div id="status" class="disconnected">❌ 연결 안 됨</div>

    <div class="control-panel">
        <div class="input-row">
            <label>채팅방 ID:</label>
            <input type="number" id="roomId" value="1" min="1">
        </div>
        <div class="input-row">
            <label>내 사용자 ID:</label>
            <input type="number" id="senderId" value="100" min="1">
            <span style="font-size: 12px; color: #666; white-space: nowrap;">👤 (DB의 User ID)</span>
        </div>
        <div class="input-row">
            <button onclick="connect()">✅ 접속 및 방 입장</button>
            <button class="disconnect" onclick="disconnect()">❌ 연결 끊기</button>
        </div>
    </div>

    <div id="chat-box"></div>

        <!-- 메시지 입력 영역 -->
    <div class="msg-input-group">
        <input type="text" id="message" placeholder="메시지 입력 후 Enter 또는 전송 클릭..." onkeypress="if(event.keyCode==13) sendMessage()">
        <button onclick="sendMessage()">전송</button>
    </div>

    <!-- 이미지 업로드 영역 -->
    <div style="margin-top: 10px; padding: 15px; background: #fff3e0; border-radius: 5px; border: 1px solid #ffcc80;">
        <div style="font-weight: bold; margin-bottom: 10px; color: #e65100;">📷 이미지 전송</div>
        <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
            <input type="file" id="imageFile" accept="image/jpeg,image/png,image/webp"
                   style="flex: 1; min-width: 150px; padding: 5px; border: 1px solid #ddd; border-radius: 4px; background: white;">
            <input type="text" id="imageMessage" placeholder="이미지와 함께 보낼 메시지 (선택)"
                   style="flex: 2; min-width: 150px; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
            <button onclick="sendImageMessage()"
                    style="padding: 10px 20px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">
                📤 이미지 전송
            </button>
        </div>
        <div style="margin-top: 8px; font-size: 11px; color: #666;">
            💡 지원 형식: JPG, PNG, WEBP (최대 5MB)
        </div>
        <!-- 업로드 진행 상태 -->
        <div id="uploadProgress" style="display: none; margin-top: 10px;">
            <div style="background: #e0e0e0; border-radius: 4px; height: 20px; overflow: hidden;">
                <div id="progressBar" style="background: #4CAF50; height: 100%; width: 0%; transition: width 0.3s;"></div>
            </div>
            <div id="progressText" style="text-align: center; font-size: 12px; margin-top: 5px;"></div>
        </div>
    </div>

    <!-- 로그 영역 -->
    <div style="margin-top: 20px; border-top: 2px solid #ccc; padding-top: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0;">📋 시스템 로그</h3>
            <button onclick="clearLogs()" style="padding: 5px 10px; background: #ff9800; color: white; border: none; border-radius: 4px; cursor: pointer;">로그 지우기</button>
        </div>
        <div id="log-box" style="width: 100%; height: 200px; border: 2px solid #ddd; overflow-y: auto; padding: 10px; background: #000; color: #0f0; font-family: 'Courier New', monospace; font-size: 11px; line-height: 1.4; border-radius: 5px;"></div>
    </div>
</div>

<script>
    let stompClient = null;
    let currentJwtToken = null;
    let currentUser = null;
    let currentRoomId = null;  // ✅ 전역 변수 추가
    let currentSenderId = null;  // ✅ 전역 변수 추가
    let displayedMessageIds = new Set();  // ✅ 이미 표시된 메시지 ID 추적 (중복 방지)

    /**
     * JWT 토큰으로 로그인하고 사용자 정보 조회
     */
    function loginWithToken() {
        const jwtToken = document.getElementById('jwtTokenLogin').value.trim();

        if (!jwtToken) {
            alert('JWT 토큰을 입력해주세요');
            return;
        }

        appendLog('🔐 로그인 시도: ' + jwtToken.substring(0, 30) + '...');

        // /api/me 엔드포인트 호출하여 사용자 정보 조회
        // 현재 페이지의 호스트를 사용
        const apiUrl = window.location.protocol + '//' + window.location.host + '/api/me';
        appendLog('📡 API 호출: ' + apiUrl);

        fetch(apiUrl, {
            method: 'GET',
            headers: {
                'Authorization': 'Bearer ' + jwtToken,
                'Content-Type': 'application/json'
            }
        })
        .then(response => {
            if (!response.ok) {
                throw new Error('로그인 실패: ' + response.status);
            }
            return response.json();
        })
        .then(data => {
            // 로그인 성공
            currentJwtToken = jwtToken;
            currentUser = data;

            appendLog('✅ 로그인 성공: userId=' + data.id + ', nickname=' + data.nickname);
            appendMessage('시스템', '✅ 로그인 성공! 닉네임: ' + data.nickname, 'darkgreen');

            // UI 업데이트
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userNickname').innerText = data.nickname;

            // 사용자 ID 자동 설정 (선택사항)
            document.getElementById('senderId').value = data.id;
        })
        .catch(error => {
            appendLog('❌ 로그인 실패: ' + error.message);
            appendMessage('시스템', '❌ 로그인 실패: ' + error.message, 'red');
        });
    }

    /**
     * 로그아웃
     */
    function logout() {
        currentJwtToken = null;
        currentUser = null;

        // 연결된 경우 연결 해제
        if (stompClient && stompClient.connected) {
            disconnect();
        }

        // UI 업데이트
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('userInfo').style.display = 'none';
        document.getElementById('jwtTokenLogin').value = '';

        appendMessage('시스템', '👋 로그아웃 했습니다.', 'orange');
        log.info('로그아웃 완료');
    }

    function connect() {
        // 로그인 확인
        if (!currentJwtToken) {
            alert('먼저 로그인해주세요');
            appendMessage('시스템', '❌ 로그인이 필요합니다', 'red');
            return;
        }

        currentRoomId = document.getElementById('roomId').value;  // ✅ 전역 변수에 할당
        currentSenderId = document.getElementById('senderId').value;  // ✅ 전역 변수에 할당

        appendMessage('시스템', '✏️ 연결 시도 중...', 'orange');

        // WebSocket URL 동적 생성 (현재 페이지의 호스트 사용)
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = protocol + '//' + window.location.host + '/ws-stomp';
        appendLog('🔌 WebSocket 연결 시도: ' + wsUrl);

        // 1. STOMP 클라이언트 설정
        const clientConfig = {
            brokerURL: wsUrl,
            connectHeaders: {
                'Authorization': 'Bearer ' + currentJwtToken
            },
            debug: function (str) {
                console.log('[STOMP DEBUG] ' + str);
                appendLog('STOMP: ' + str);
            },
            reconnectDelay: 5000,
            heartbeatIncoming: 4000,
            heartbeatOutgoing: 4000,
        };

        appendLog('🔐 JWT 토큰 적용: ' + currentUser.nickname);

        stompClient = new StompJs.Client(clientConfig);

        stompClient.onConnect = function (frame) {
            console.log('✅ 연결 성공: ' + frame);
            updateStatus(true);
            appendMessage('시스템', '✅ 서버에 연결되었습니다! (방 번호: ' + currentRoomId + ')', 'darkgreen');
            appendLog('✅ WebSocket 연결 성공');

            // 2. 채팅방 구독 (Subscribe)
            const destination = '/topic/chat/room/' + currentRoomId;  // ✅ /topic으로 변경
            console.log('📡 구독 시작: ' + destination);
            appendLog('📡 구독 시작: ' + destination);
            appendMessage('시스템', '📡 구독 중: ' + destination, 'blue');

            stompClient.subscribe(destination, function (chatMessage) {
                try {
                    appendLog('📥 WebSocket 메시지 도착!');
                    console.log('📥 Raw message:', chatMessage);

                    const data = JSON.parse(chatMessage.body);
                    console.log('📨 파싱된 메시지:', data);
                    appendLog('📨 파싱 성공: ' + JSON.stringify(data));

                    // ✅ 중복 메시지 체크 (messageId 기반)
                    const messageId = data.messageId || data.id;
                    if (messageId && displayedMessageIds.has(messageId)) {
                        appendLog('⚠️ 중복 메시지 무시: messageId=' + messageId);
                        return;  // 이미 표시된 메시지면 무시
                    }
                    if (messageId) {
                        displayedMessageIds.add(messageId);
                    }

                    const messageContent = data.message || data.content;  // ✅ message와 content 모두 지원
                    const isMyMsg = String(data.senderId) === String(currentSenderId);  // ✅ currentSenderId 사용
                    const senderName = data.nickname || data.senderName || data.senderId;  // ✅ nickname 우선 사용
                    const imageUrl = data.imageUrl || null;  // ✅ 이미지 URL

                    appendLog('👤 발송자: ' + senderName + ', 타입: ' + (data.type || 'TEXT') + ', msgId: ' + messageId);

                    // 이미지 메시지인 경우
                    if (data.type === 'IMAGE' && imageUrl) {
                        appendLog('📸 이미지 메시지 수신: ' + imageUrl);
                        appendMessage(senderName, messageContent, isMyMsg ? 'blue' : 'green', imageUrl);
                    } else {
                        appendMessage(senderName, messageContent, isMyMsg ? 'blue' : 'green');
                    }

                    appendLog('✅ 메시지 표시 완료!');
                } catch (e) {
                    console.error('❌ 메시지 파싱 오류:', e);
                    appendLog('❌ 메시지 파싱 오류: ' + e.message);
                    appendLog('❌ Raw body: ' + chatMessage.body);
                    appendMessage('오류', '메시지 파싱 오류: ' + e.message, 'red');
                }
            });

            // (선택) 입장 메시지 발송 - 비활성화 (DB에 저장하지 않음)
            // sendEnterMessage(currentRoomId, currentSenderId);
        };

        stompClient.onStompError = function (frame) {
            console.error('❌ STOMP 에러:', frame);
            appendLog('❌ STOMP 에러: ' + (frame.headers['message'] || frame));
            appendMessage('에러', 'STOMP 에러: ' + (frame.headers['message'] || frame), 'red');
        };

        stompClient.onWebSocketError = function (event) {
            console.error('❌ WebSocket 에러:', event);
            appendLog('❌ WebSocket 에러 발생');
            appendMessage('에러', 'WebSocket 연결 실패!', 'red');
        };

        stompClient.onDisconnect = function (frame) {
            console.log('⚠️ 연결 해제:', frame);
            appendLog('⚠️ 연결 해제됨');
            appendMessage('시스템', '⚠️ 서버 연결이 끊어졌습니다.', 'red');
            updateStatus(false);
        };

        console.log('🔌 WebSocket 활성화 중...');
        appendLog('🔌 WebSocket 활성화 중...');
        stompClient.activate();
    }

    function disconnect() {
        if (stompClient !== null && stompClient.connected) {
            stompClient.deactivate();
            updateStatus(false);
            displayedMessageIds.clear();  // ✅ 메시지 ID 초기화
            appendMessage('시스템', '✂️ 연결이 끊어졌습니다.', 'red');
        } else {
            appendMessage('시스템', '❌ 연결된 상태가 아닙니다.', 'red');
        }
    }

    function sendMessage() {
        if (!stompClient || !stompClient.connected) {
            alert("❌ 먼저 접속해주세요!");
            appendMessage('시스템', '❌ 서버에 연결되지 않았습니다.', 'red');
            return;
        }

        const msgInput = document.getElementById('message');
        const messageText = msgInput.value.trim();

        if (!messageText) {
            alert("❌ 메시지를 입력해주세요!");
            return;
        }

        // 3. 메시지 발행 (Publish)
        const chatMessage = {
            type: 'TEXT',
            roomId: Number(currentRoomId),  // ✅ currentRoomId 사용
            content: messageText
        };

        console.log('📤 메시지 발송 정보:');
        console.log('  - 목표 경로: /app/chat/send');
        console.log('  - 메시지 객체:', chatMessage);
        appendLog('📤 메시지 발송: ' + messageText);

        try {
            console.log('🚀 stompClient.publish() 호출');
            appendLog('🚀 stompClient.publish() 호출');
            stompClient.publish({
                destination: '/app/chat/send',
                body: JSON.stringify(chatMessage)
            });
            console.log('✅ stompClient.publish() 완료');
            appendLog('✅ stompClient.publish() 완료');
            msgInput.value = '';
        } catch (e) {
            console.error('❌ 메시지 발송 오류:', e);
            appendLog('❌ 메시지 발송 오류: ' + e.message);
            appendMessage('오류', '메시지 발송 실패: ' + e.message, 'red');
        }
    }

    function sendEnterMessage(roomId, senderId) {
        const chatMessage = {
            type: 'ENTER',
            roomId: Number(roomId),
            content: '채팅방에 입장했습니다.'  // ✅ "message"에서 "content"로 변경
        };

        console.log('📤 입장 메시지 발송:', chatMessage);
        try {
            stompClient.publish({
                destination: '/app/chat/send',
                body: JSON.stringify(chatMessage)
            });
        } catch (e) {
            console.error('❌ 입장 메시지 발송 오류:', e);
        }
    }

    function appendMessage(sender, message, color, imageUrl = null) {
        const chatBox = document.getElementById('chat-box');
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg';
        msgDiv.style.color = color;
        msgDiv.style.fontSize = '12px';

        // 이미지가 있는 경우
        if (imageUrl) {
            const timestamp = new Date().toLocaleTimeString();
            msgDiv.innerHTML = `
                <div>[${timestamp}] [${sender}]</div>
                <img src="${imageUrl}" style="max-width: 200px; max-height: 200px; margin: 5px 0; border-radius: 5px; cursor: pointer;"
                     onclick="window.open('${imageUrl}', '_blank')" title="클릭하여 원본 보기">
                ${message ? `<div>${message}</div>` : ''}
            `;
        } else {
            msgDiv.innerText = `[${new Date().toLocaleTimeString()}] [${sender}] ${message}`;
        }

        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendLog(message) {
        const logBox = document.getElementById('log-box');
        const logDiv = document.createElement('div');
        const timestamp = new Date().toLocaleTimeString();
        logDiv.innerText = `[${timestamp}] ${message}`;
        logDiv.style.color = '#0f0';  // 초록색
        logBox.appendChild(logDiv);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function clearLogs() {
        const logBox = document.getElementById('log-box');
        logBox.innerHTML = '';
        appendLog('로그가 초기화되었습니다.');
    }

    function updateStatus(connected) {
        const statusDiv = document.getElementById('status');
        if (connected) {
            statusDiv.className = 'connected';
            statusDiv.innerText = '✅ 연결됨';
        } else {
            statusDiv.className = 'disconnected';
            statusDiv.innerText = '❌ 연결 안 됨';
        }
    }

    /**
     * 이미지 메시지 전송 (FormData + multipart/form-data)
     */
    async function sendImageMessage() {
        // 로그인 확인
        if (!currentJwtToken) {
            alert('먼저 로그인해주세요');
            appendMessage('시스템', '❌ 로그인이 필요합니다', 'red');
            return;
        }

        // 채팅방 연결 확인
        if (!currentRoomId) {
            alert('먼저 채팅방에 접속해주세요');
            appendMessage('시스템', '❌ 채팅방에 접속해주세요', 'red');
            return;
        }

        const fileInput = document.getElementById('imageFile');
        const messageInput = document.getElementById('imageMessage');
        const file = fileInput.files[0];
        const message = messageInput.value.trim() || null;

        // 파일 선택 확인
        if (!file) {
            alert('이미지를 선택해주세요');
            appendMessage('시스템', '❌ 이미지 파일을 선택해주세요', 'red');
            return;
        }

        // 파일 타입 검증
        const allowedTypes = ['image/jpeg', 'image/png', 'image/webp'];
        if (!allowedTypes.includes(file.type)) {
            alert('지원하지 않는 이미지 형식입니다. (jpg/png/webp만 가능)');
            appendMessage('시스템', '❌ 지원하지 않는 이미지 형식입니다', 'red');
            return;
        }

        // 파일 크기 검증 (5MB)
        const maxSize = 5 * 1024 * 1024;
        if (file.size > maxSize) {
            alert('파일 크기가 5MB를 초과합니다');
            appendMessage('시스템', '❌ 파일 크기가 5MB를 초과합니다', 'red');
            return;
        }

        // 진행 상태 표시
        const progressDiv = document.getElementById('uploadProgress');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        progressDiv.style.display = 'block';
        progressBar.style.width = '0%';
        progressText.innerText = '업로드 준비 중...';

        appendLog('📤 이미지 업로드 시작: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + 'KB)');
        appendMessage('시스템', '📤 이미지 업로드 중...', 'orange');

        try {
            // FormData 생성
            const formData = new FormData();
            formData.append('image', file);
            if (message) {
                formData.append('message', message);
            }

            // API URL 생성
            const apiUrl = window.location.protocol + '//' + window.location.host +
                           '/api/v1/chat/rooms/' + currentRoomId + '/images';

            appendLog('📡 API 호출: ' + apiUrl);

            // XMLHttpRequest로 업로드 (진행 상태 표시를 위해)
            const xhr = new XMLHttpRequest();

            xhr.upload.addEventListener('progress', function(e) {
                if (e.lengthComputable) {
                    const percentComplete = Math.round((e.loaded / e.total) * 100);
                    progressBar.style.width = percentComplete + '%';
                    progressText.innerText = '업로드 중... ' + percentComplete + '%';
                    appendLog('📊 업로드 진행: ' + percentComplete + '%');
                }
            });

            xhr.addEventListener('load', function() {
                progressDiv.style.display = 'none';

                if (xhr.status === 200) {
                    const response = JSON.parse(xhr.responseText);
                    appendLog('✅ 이미지 업로드 성공: ' + JSON.stringify(response));

                    if (response.status === 'success' && response.data) {
                        const data = response.data;
                        // WebSocket으로 메시지가 브로드캐스트되므로 여기서는 표시하지 않음
                        // (중복 표시 방지)
                        appendLog('📸 이미지 URL: ' + data.imageUrl);
                        appendLog('👤 발신자: ' + (data.nickname || data.senderName) + ' (userId: ' + data.userId + ')');
                        appendLog('🕐 생성시간: ' + data.createdAt);
                        appendLog('ℹ️ WebSocket으로 메시지가 전달됩니다.');
                    }

                    // 입력 초기화
                    fileInput.value = '';
                    messageInput.value = '';
                } else {
                    let errorMsg = '이미지 업로드 실패';
                    try {
                        const errorResponse = JSON.parse(xhr.responseText);
                        errorMsg = errorResponse.message || errorMsg;
                    } catch (e) {}

                    appendLog('❌ 업로드 실패: HTTP ' + xhr.status);
                    appendMessage('시스템', '❌ ' + errorMsg, 'red');
                }
            });

            xhr.addEventListener('error', function() {
                progressDiv.style.display = 'none';
                appendLog('❌ 네트워크 오류');
                appendMessage('시스템', '❌ 네트워크 오류가 발생했습니다', 'red');
            });

            xhr.open('POST', apiUrl, true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + currentJwtToken);
            // Content-Type은 FormData 사용 시 자동 설정됨 (boundary 포함)
            xhr.send(formData);

        } catch (error) {
            progressDiv.style.display = 'none';
            appendLog('❌ 이미지 업로드 오류: ' + error.message);
            appendMessage('시스템', '❌ 이미지 업로드 실패: ' + error.message, 'red');
        }
    }
</script>
</body>
</html>
